name: Deploy Service

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: 'Cloud Run service name'
      dockerfile:
        required: true
        type: string
        description: 'Path to Dockerfile'
      context:
        required: false
        type: string
        description: 'Docker build context'
        default: '.'
      build_args:
        required: false
        type: string
        description: 'Docker build args (multi-line KEY=VALUE)'
        default: ''
      env_vars:
        required: false
        type: string
        description: 'Cloud Run env vars (multi-line KEY=VALUE)'
        default: ''
      third_party_submodules:
        required: false
        type: string
        description: >-
          recursive — git submodule update --init --recursive (full third_party).
          viewer — only third_party/material-samples, material-viewer, and three.js (smaller/faster Docker context; no Blender/MaterialX/OSL sources).
        default: 'recursive'
    secrets:
      GCP_SA_KEY:
        required: true

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    env:
      GAR_HOSTNAME: us-central1-docker.pkg.dev
      PROJECT_ID: bhouston-general-hosting
      REGION: us-central1
      DOCKER_REGISTRY: shared-docker-registry
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          # viewer: disable recursive submodule fetch here; next step inits only material-samples + material-viewer + three.js
          submodules: ${{ inputs.third_party_submodules != 'viewer' && 'recursive' || false }}

      - name: Checkout viewer third_party submodules
        if: ${{ inputs.third_party_submodules == 'viewer' }}
        run: >-
          git submodule update --init --depth 1
          third_party/material-samples
          third_party/material-viewer
          third_party/three.js

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          skip_install: true

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GAR_HOSTNAME }}

      - name: Set image path
        run: echo "IMAGE_PATH=${{ env.GAR_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.DOCKER_REGISTRY }}/${{ inputs.service_name }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and Push Container
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ env.IMAGE_PATH }}
          build-args: ${{ inputs.build_args }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ inputs.service_name }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_PATH }}
          flags: '--allow-unauthenticated'
          env_vars: ${{ inputs.env_vars }}
